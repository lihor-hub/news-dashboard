# Run `pre-commit install` once after cloning; hooks then run on every commit.
# Run all hooks manually with: pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^helm/  # Helm templates are not plain YAML
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=1000] # website/package-lock.json (Docusaurus) exceeds the 500KB default
      - id: check-merge-conflict
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: mypy backend
        language: system
        types: [python]
        pass_filenames: false
      - id: ty
        name: ty
        entry: ty check backend
        language: system
        types: [python]
        pass_filenames: false
      - id: pyrefly
        name: pyrefly
        entry: pyrefly check backend
        language: system
        types: [python]
        pass_filenames: false
      - id: eslint
        name: eslint
        entry: npm run lint --silent
        language: system
        files: \.(ts|tsx|mjs)$
        pass_filenames: false
      - id: prettier
        name: prettier
        entry: npm run format:check --silent
        language: system
        files: \.(ts|tsx|css|html|json|mjs)$
        pass_filenames: false
      - id: tsc
        name: tsc (typecheck)
        entry: npm run typecheck --silent
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false

      # ── pre-push: full quality gate before code leaves the machine ─────────
      # The linters/type-checkers also run on the pre-push stage (in addition to
      # pre-commit) so a push is blocked even if some commits skipped hooks.
      # Tests live here only — too slow for every commit.
      # Enable with: pre-commit install --hook-type pre-push
      - id: ruff-push
        name: ruff (pre-push)
        entry: ruff check backend
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: mypy-push
        name: mypy (pre-push)
        entry: mypy backend
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: ty-push
        name: ty (pre-push)
        entry: ty check backend
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: pyrefly-push
        name: pyrefly (pre-push)
        entry: pyrefly check backend
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: pytest
        name: pytest (backend)
        entry: zsh -c 'set -a; if [ -f .env ]; then source .env; fi; set +a; pytest'
        language: system
        types: [python]
        pass_filenames: false
        stages: [pre-push]
      - id: vitest
        name: vitest (frontend)
        entry: npm run test:frontend --silent
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        stages: [pre-push]
