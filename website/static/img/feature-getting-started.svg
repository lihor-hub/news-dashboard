<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" role="img" aria-label="Phone showing a news feed">
  <rect width="96" height="96" rx="21" fill="#221f1a"/>
  <!-- Phone frame -->
  <rect x="30" y="16" width="36" height="64" rx="7" fill="none" stroke="#f0ede8" stroke-width="3"/>
  <!-- Headline bar -->
  <rect x="37" y="25" width="22" height="5" rx="2" fill="#f0ede8"/>
  <!-- Article rows -->
  <rect x="37" y="35" width="22" height="3" rx="1.5" fill="#f0ede8" opacity="0.7"/>
  <rect x="37" y="41" width="17" height="3" rx="1.5" fill="#f0ede8" opacity="0.5"/>
  <rect x="37" y="47" width="20" height="3" rx="1.5" fill="#f0ede8" opacity="0.35"/>
  <!-- Amber card -->
  <rect x="37" y="54" width="22" height="12" rx="2.5" fill="#c8a45e" opacity="0.9"/>
  <!-- Home indicator -->
  <rect x="43" y="72" width="10" height="2.5" rx="1.25" fill="#f0ede8" opacity="0.5"/>
</svg>
