services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: news_dashboard
      POSTGRES_USER: news_dashboard
      POSTGRES_PASSWORD: news-dashboard-local-password
    volumes:
      - news-dashboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news_dashboard -d news_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  news-dashboard:
    build: .
    image: news-dashboard:local
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: news_dashboard
      POSTGRES_USER: news_dashboard
      POSTGRES_PASSWORD: news-dashboard-local-password
      # Local-development-only auth defaults. Override all three for any non-local deployment.
      SESSION_SECRET: ${SESSION_SECRET:-dev-only-secret-change-before-deploying-00000000000}
      # Optional: override digest mark-read token signing separately from SESSION_SECRET.
      TOKEN_SECRET: ${TOKEN_SECRET:-}
      BOOTSTRAP_ADMIN_USERNAME: ${BOOTSTRAP_ADMIN_USERNAME:-admin}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-change-me}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      FREE_LLM_API_KEY: ${FREE_LLM_API_KEY:-}
      FREE_LLM_BASE_URL: ${FREE_LLM_BASE_URL:-}
      DATA_DIR: /data
    volumes:
      - news-dashboard-data:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  news-dashboard-postgres:
  news-dashboard-data:
