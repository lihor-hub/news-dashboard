services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: news_dashboard
      POSTGRES_USER: news_dashboard
      POSTGRES_PASSWORD: news-dashboard-local-password
    volumes:
      - news-dashboard-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U news_dashboard -d news_dashboard"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  news-dashboard:
    build: .
    image: news-dashboard:local
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: news_dashboard
      POSTGRES_USER: news_dashboard
      POSTGRES_PASSWORD: news-dashboard-local-password
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  news-dashboard-postgres:
