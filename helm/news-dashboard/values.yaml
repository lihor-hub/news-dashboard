replicaCount: 1

image:
  repository: ghcr.io/ioachim-hub/news-dashboard
  # CI overrides this with the commit SHA so Kubernetes always pulls the exact
  # image that was just built.  'latest' is only used for manual local deploys.
  tag: latest
  # IfNotPresent is correct because CI pins an immutable SHA tag.
  # Never use 'latest' + 'IfNotPresent' together — Kubernetes won't re-pull.
  pullPolicy: IfNotPresent
  # Name of a pre-existing kubernetes.io/dockerconfigjson Secret that gives the
  # cluster pull access to GHCR.  The CI deploy job creates/refreshes this
  # secret automatically.  Leave empty only if the GHCR package is public.
  pullSecretName: ghcr-pull-secret

service:
  type: ClusterIP
  port: 8080
  # Set type: NodePort and nodePort: <30000-32767> when Caddy runs on the host
  # and needs a stable port that survives pod restarts and Helm upgrades.
  # Example override: helm upgrade --set service.type=NodePort,service.nodePort=30088
  nodePort: ""

# SQLite fallback only. Production/local-k8s uses PostgreSQL below.
persistence:
  enabled: true
  size: 1Gi
  storageClassName: ""
  hostPath: ""

app:
  databasePath: /data/news-dashboard.db
  auth:
    enabled: true
    # Override per deployment (CI sets these from repo Variables).
    publicBaseUrl: https://news.example.com
    keycloakServerUrl: https://news.example.com/keycloak
    keycloakInternalServerUrl: https://news.example.com/keycloak
    realm: news-dashboard
    clientId: news-dashboard
    # Optional. Set this when the Keycloak client uses "confidential" access type.
    clientSecret: ""
    # Comma-separated usernames that become app admins when first seen from Keycloak.
    adminUsernames: admin
    # Override in CI/local deploy with a long random string.
    sessionSecret: ""
  ai:
    # Optional: pre-existing Secret with OPENAI_API_KEY.
    existingSecret: ""
    openaiApiKeyKey: OPENAI_API_KEY

postgresql:
  enabled: true
  image: postgres:16-alpine
  database: news_dashboard
  username: news_dashboard
  # Internal cluster password. Override in real environments.
  password: news-dashboard-local-password
  port: 5432
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
    # Local single-node durable storage path on the node (override per deploy).
    hostPath: /data/news-dashboard-postgres-data

ingress:
  enabled: false
  className: ""
  host: news.example.com
  annotations: {}
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
