replicaCount: 1

image:
  repository: ghcr.io/lihor-hub/news-dashboard
  # CI overrides this with the commit SHA so Kubernetes always pulls the exact
  # image that was just built.  'latest' is only used for manual local deploys.
  tag: latest
  # IfNotPresent is correct because CI pins an immutable SHA tag.
  # Never use 'latest' + 'IfNotPresent' together — Kubernetes won't re-pull.
  pullPolicy: IfNotPresent
  # Name of a pre-existing kubernetes.io/dockerconfigjson Secret that gives the
  # cluster pull access to GHCR.  The CI deploy job creates/refreshes this
  # secret automatically.  Leave empty only if the GHCR package is public.
  pullSecretName: ghcr-pull-secret

service:
  type: ClusterIP
  port: 8080
  # Set type: NodePort and nodePort: <30000-32767> when Caddy runs on the host
  # and needs a stable port that survives pod restarts and Helm upgrades.
  # Example override: helm upgrade --set service.type=NodePort,service.nodePort=30088
  nodePort: ""

app:
  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  postgresExternal:
    # Set host when postgresql.enabled is false to use an external PostgreSQL.
    host: ""
    port: 5432
    database: ""
    username: ""
    # Secret name containing the database password.
    passwordSecretName: ""
    passwordSecretKey: "POSTGRES_PASSWORD"
  databaseUrl:
    # Alternatively, specify a pre-existing Secret containing a full DATABASE_URL.
    existingSecret: ""
    key: "DATABASE_URL"
  auth:
    enabled: true
    publicBaseUrl: https://news.lihor.ro
    keycloakServerUrl: https://news.lihor.ro/keycloak
    keycloakInternalServerUrl: https://news.lihor.ro/keycloak
    realm: news-dashboard
    clientId: news-dashboard
    # Optional. Set this when the Keycloak client uses "confidential" access type.
    clientSecret: ""
    # Comma-separated usernames that become app admins when first seen from Keycloak.
    adminUsernames: ioachim
    # Optional. Confidential client (service account) used by the in-app admin
    # page to create users via the Keycloak Admin REST API. The client needs the
    # realm-management "manage-users" role. Defaults to clientId when unset.
    adminClientId: ""
    # Service-account secret for adminClientId. Leave empty to disable in-app
    # user creation (the admin page then reports it is not configured).
    adminClientSecret: ""
    # Override in CI/local deploy with a long random string.
    sessionSecret: ""
    # Optional. Overrides digest mark-read token signing separately from sessionSecret.
    tokenSecret: ""
  ai:
    # Optional: pre-existing Secret with OPENAI_API_KEY and FREE_LLM_API_KEY.
    existingSecret: ""
    # Key within existingSecret holding the real OpenAI API key (used for TTS audio).
    openaiApiKeyKey: OPENAI_API_KEY
    # All LLM chat/completion/embedding calls route through the free LLM gateway.
    # Set freeLlmBaseUrl to your self-hosted OpenAI-compatible proxy base URL.
    # Leave empty to fall back to OPENAI_API_KEY / official OpenAI endpoint.
    freeLlmBaseUrl: ""
    briefingModel: ""
    # Key within existingSecret holding the free LLM gateway API key.
    freeLlmApiKeyKey: FREE_LLM_API_KEY
    # Langfuse LLM observability. When publicKey + secretKey are present (read
    # from `ai.existingSecret`), every OpenAI call is traced. Leave host empty
    # to disable tracing entirely (app falls back to a plain OpenAI client).
    langfuse:
      host: ""
      # Keys within `app.ai.existingSecret` holding the Langfuse credentials.
      publicKeyKey: LANGFUSE_PUBLIC_KEY
      secretKeyKey: LANGFUSE_SECRET_KEY
  push:
    # Optional: pre-existing Secret with VAPID keys.
    existingSecret: ""
    vapidPublicKeyKey: VAPID_PUBLIC_KEY
    vapidPrivateKeyKey: VAPID_PRIVATE_KEY
    # VAPID claims email address. Omit or leave empty to default safely.
    email: ""
  sentry:
    # Optional: pre-existing Secret with SENTRY_DSN and/or SENTRY_DSN_FRONTEND.
    existingSecret: ""
    dsnKey: SENTRY_DSN
    frontendDsnKey: SENTRY_DSN_FRONTEND
    # Sentry environment tag. Leave empty to let the SDK default to production.
    environment: ""
    # Optional release identifier, usually set by CI to the deployed commit SHA.
    release: ""

ingestCronJob:
  enabled: true
  podSecurityContext:
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
      drop: ["ALL"]
  schedule: "17 */6 * * *"
  # Keep private single-node ingestion serialized; skip new runs while one is active.
  concurrencyPolicy: Forbid
  # Allow one missed schedule window after node downtime, but avoid stale catch-up storms.
  startingDeadlineSeconds: 1800
  # Fail stuck ingest jobs visibly before the next six-hour schedule window.
  activeDeadlineSeconds: 3600
  # Retry once for transient pod failures without hiding persistent ingest problems.
  backoffLimit: 1
  # Optional cluster cleanup for finished Jobs. Leave empty to preserve history limits.
  ttlSecondsAfterFinished: ""
  # Resource requests/limits for the ingest CronJob container.
  # On a single-node deployment these prevent ingest spikes from crowding the app pod.
  # Example override: helm upgrade --set ingestCronJob.resources.requests.cpu=100m
  resources: {}
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi

postgresql:
  enabled: true
  image: postgres:16-alpine
  podSecurityContext:
    fsGroup: 999
    seccompProfile:
      type: RuntimeDefault
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop: ["ALL"]
  database: news_dashboard
  username: news_dashboard
  # Internal cluster password. Required when postgresql.enabled=true.
  # Helm will fail to render if this is empty and postgresql.enabled=true.
  # For local development, you can set it to a known value during install.
  password: ""
  port: 5432
  # Resource requests/limits for the bundled PostgreSQL StatefulSet container.
  # On a single-node deployment these prevent Postgres memory spikes from crowding the app pod.
  # Example override: helm upgrade --set postgresql.resources.requests.memory=256Mi
  resources: {}
  # resources:
  #   requests:
  #     cpu: 100m
  #     memory: 256Mi
  #   limits:
  #     cpu: 500m
  #     memory: 512Mi
  persistence:
    enabled: true
    size: 2Gi
    storageClassName: ""
    # Local single-node durable storage. This survives pod restarts/upgrades.
    hostPath: /home/ioachim-minipc/news-dashboard-postgres-data
  backup:
    # Set to true to enable scheduled PostgreSQL logical backups.
    enabled: false
    # Cron schedule for the backup job. Default: daily at 02:00.
    schedule: "0 2 * * *"
    # Number of days to retain backup files. Dumps older than this are pruned.
    retentionDays: 7
    # Host path for backup storage. Must differ from the live data hostPath.
    # Example: /home/ioachim-minipc/news-dashboard-postgres-backups
    hostPath: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi

ingress:
  enabled: false
  className: ""
  host: news.lihor.ro
  annotations: {}
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
