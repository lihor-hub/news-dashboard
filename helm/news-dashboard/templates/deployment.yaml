apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "news-dashboard.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName | quote }}
      {{- end }}
      containers:
        - name: news-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          env:
{{- if .Values.postgresql.enabled }}
            - name: POSTGRES_HOST
              value: {{ printf "%s-postgres" (include "news-dashboard.fullname" .) | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-postgres
                  key: POSTGRES_PASSWORD
{{- else }}
            - name: NEWS_DASHBOARD_DB
              value: {{ .Values.app.databasePath | quote }}
{{- end }}
{{- if .Values.app.ai.existingSecret }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.ai.existingSecret | quote }}
                  key: {{ .Values.app.ai.openaiApiKeyKey | quote }}
                  optional: true
{{- end }}
{{- if .Values.app.auth.enabled }}
            - name: KEYCLOAK_AUTH_ENABLED
              value: "1"
            - name: NEWS_DASHBOARD_BASE_URL
              value: {{ .Values.app.auth.publicBaseUrl | quote }}
            - name: KEYCLOAK_SERVER_URL
              value: {{ .Values.app.auth.keycloakServerUrl | quote }}
            - name: KEYCLOAK_INTERNAL_SERVER_URL
              value: {{ .Values.app.auth.keycloakInternalServerUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.app.auth.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.app.auth.clientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-auth
                  key: KEYCLOAK_CLIENT_SECRET
            - name: KEYCLOAK_ADMIN_USERNAMES
              value: {{ .Values.app.auth.adminUsernames | quote }}
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-auth
                  key: SESSION_SECRET
{{- end }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
{{ toYaml .Values.resources | indent 12 }}
      volumes:
        - name: data
{{- if .Values.persistence.hostPath }}
          hostPath:
            path: {{ .Values.persistence.hostPath | quote }}
            type: DirectoryOrCreate
{{- else if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "news-dashboard.fullname" . }}
{{- else }}
          emptyDir: {}
{{- end }}
