apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "news-dashboard.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "news-dashboard.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 1000
      {{- if .Values.image.pullSecretName }}
      imagePullSecrets:
        - name: {{ .Values.image.pullSecretName | quote }}
      {{- end }}
      containers:
        - name: news-dashboard
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          env:
            - name: INGEST_INTERVAL_SCHEDULER_ENABLED
              value: {{ ternary "false" "true" .Values.ingestCronJob.enabled | quote }}
{{- if .Values.postgresql.enabled }}
            - name: POSTGRES_HOST
              value: {{ printf "%s-postgres" (include "news-dashboard.fullname" .) | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.postgresql.port | quote }}
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-postgres
                  key: POSTGRES_PASSWORD
{{- else }}
  {{- if and .Values.app.postgresExternal .Values.app.postgresExternal.host }}
            - name: POSTGRES_HOST
              value: {{ .Values.app.postgresExternal.host | quote }}
            - name: POSTGRES_PORT
              value: {{ .Values.app.postgresExternal.port | default 5432 | quote }}
            - name: POSTGRES_DB
              value: {{ .Values.app.postgresExternal.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.app.postgresExternal.username | quote }}
    {{- if .Values.app.postgresExternal.passwordSecretName }}
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.postgresExternal.passwordSecretName | quote }}
                  key: {{ .Values.app.postgresExternal.passwordSecretKey | default "POSTGRES_PASSWORD" | quote }}
    {{- end }}
  {{- else if and .Values.app.databaseUrl .Values.app.databaseUrl.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.databaseUrl.existingSecret | quote }}
                  key: {{ .Values.app.databaseUrl.key | default "DATABASE_URL" | quote }}
  {{- else }}
    {{- fail "External PostgreSQL configuration is required when postgresql.enabled=false. Provide app.postgresExternal or app.databaseUrl." }}
  {{- end }}
{{- end }}
{{ include "news-dashboard.aiEnv" . | indent 12 }}
{{- if .Values.app.push }}
{{- if .Values.app.push.existingSecret }}
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.push.existingSecret | quote }}
                  key: {{ .Values.app.push.vapidPublicKeyKey | default "VAPID_PUBLIC_KEY" | quote }}
                  optional: true
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.app.push.existingSecret | quote }}
                  key: {{ .Values.app.push.vapidPrivateKeyKey | default "VAPID_PRIVATE_KEY" | quote }}
                  optional: true
{{- end }}
{{- if .Values.app.push.email }}
            - name: VAPID_EMAIL
              value: {{ .Values.app.push.email | quote }}
{{- end }}
{{- end }}
{{- if .Values.app.auth.enabled }}
            - name: KEYCLOAK_AUTH_ENABLED
              value: "1"
            - name: NEWS_DASHBOARD_BASE_URL
              value: {{ .Values.app.auth.publicBaseUrl | quote }}
            - name: KEYCLOAK_SERVER_URL
              value: {{ .Values.app.auth.keycloakServerUrl | quote }}
            - name: KEYCLOAK_INTERNAL_SERVER_URL
              value: {{ .Values.app.auth.keycloakInternalServerUrl | quote }}
            - name: KEYCLOAK_REALM
              value: {{ .Values.app.auth.realm | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ .Values.app.auth.clientId | quote }}
            - name: KEYCLOAK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-auth
                  key: KEYCLOAK_CLIENT_SECRET
            - name: KEYCLOAK_ADMIN_USERNAMES
              value: {{ .Values.app.auth.adminUsernames | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: {{ .Values.app.auth.adminClientId | quote }}
            - name: KEYCLOAK_ADMIN_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-auth
                  key: KEYCLOAK_ADMIN_CLIENT_SECRET
            - name: SESSION_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "news-dashboard.fullname" . }}-auth
                  key: SESSION_SECRET
{{- end }}
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/live
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
{{ toYaml .Values.resources | indent 12 }}
