apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "news-dashboard.fullname" . }}-ingest
spec:
  schedule: "17 */6 * * *"
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
          {{- if .Values.image.pullSecretName }}
          imagePullSecrets:
            - name: {{ .Values.image.pullSecretName | quote }}
          {{- end }}
          containers:
            - name: ingest
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
              command: ["news-dashboard", "ingest"]
              env:
{{- if .Values.postgresql.enabled }}
                - name: POSTGRES_HOST
                  value: {{ printf "%s-postgres" (include "news-dashboard.fullname" .) | quote }}
                - name: POSTGRES_PORT
                  value: {{ .Values.postgresql.port | quote }}
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "news-dashboard.fullname" . }}-postgres
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "news-dashboard.fullname" . }}-postgres
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "news-dashboard.fullname" . }}-postgres
                      key: POSTGRES_PASSWORD
{{- end }}
              volumeMounts:
                - name: data
                  mountPath: /data
          volumes:
            - name: data
{{- if .Values.persistence.hostPath }}
              hostPath:
                path: {{ .Values.persistence.hostPath | quote }}
                type: DirectoryOrCreate
{{- else if .Values.persistence.enabled }}
              persistentVolumeClaim:
                claimName: {{ include "news-dashboard.fullname" . }}
{{- else }}
              emptyDir: {}
{{- end }}
