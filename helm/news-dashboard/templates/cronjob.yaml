{{- if .Values.ingestCronJob.enabled }}
apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "news-dashboard.fullname" . }}-ingest
spec:
  schedule: {{ .Values.ingestCronJob.schedule | quote }}
  concurrencyPolicy: {{ .Values.ingestCronJob.concurrencyPolicy | default "Forbid" }}
  {{- with .Values.ingestCronJob.startingDeadlineSeconds }}
  startingDeadlineSeconds: {{ . }}
  {{- end }}
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      {{- with .Values.ingestCronJob.activeDeadlineSeconds }}
      activeDeadlineSeconds: {{ . }}
      {{- end }}
      {{- with .Values.ingestCronJob.backoffLimit }}
      backoffLimit: {{ . }}
      {{- end }}
      {{- with .Values.ingestCronJob.ttlSecondsAfterFinished }}
      ttlSecondsAfterFinished: {{ . }}
      {{- end }}
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
          {{- if .Values.image.pullSecretName }}
          imagePullSecrets:
            - name: {{ .Values.image.pullSecretName | quote }}
          {{- end }}
          containers:
            - name: ingest
              image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
              imagePullPolicy: {{ .Values.image.pullPolicy }}
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
              command: ["news-dashboard", "scheduled-ingest"]
              {{- with .Values.ingestCronJob.resources }}
              resources:
{{ toYaml . | indent 16 }}
              {{- end }}
              env:
{{- if .Values.postgresql.enabled }}
                - name: POSTGRES_HOST
                  value: {{ printf "%s-postgres" (include "news-dashboard.fullname" .) | quote }}
                - name: POSTGRES_PORT
                  value: {{ .Values.postgresql.port | quote }}
                - name: POSTGRES_DB
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "news-dashboard.fullname" . }}-postgres
                      key: POSTGRES_DB
                - name: POSTGRES_USER
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "news-dashboard.fullname" . }}-postgres
                      key: POSTGRES_USER
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ include "news-dashboard.fullname" . }}-postgres
                      key: POSTGRES_PASSWORD
{{- else }}
  {{- if and .Values.app.postgresExternal .Values.app.postgresExternal.host }}
                - name: POSTGRES_HOST
                  value: {{ .Values.app.postgresExternal.host | quote }}
                - name: POSTGRES_PORT
                  value: {{ .Values.app.postgresExternal.port | default 5432 | quote }}
                - name: POSTGRES_DB
                  value: {{ .Values.app.postgresExternal.database | quote }}
                - name: POSTGRES_USER
                  value: {{ .Values.app.postgresExternal.username | quote }}
    {{- if .Values.app.postgresExternal.passwordSecretName }}
                - name: POSTGRES_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.app.postgresExternal.passwordSecretName | quote }}
                      key: {{ .Values.app.postgresExternal.passwordSecretKey | default "POSTGRES_PASSWORD" | quote }}
    {{- end }}
  {{- else if and .Values.app.databaseUrl .Values.app.databaseUrl.existingSecret }}
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: {{ .Values.app.databaseUrl.existingSecret | quote }}
                      key: {{ .Values.app.databaseUrl.key | default "DATABASE_URL" | quote }}
  {{- else }}
    {{- fail "External PostgreSQL configuration is required when postgresql.enabled=false. Provide app.postgresExternal or app.databaseUrl." }}
  {{- end }}
{{- end }}
{{ include "news-dashboard.aiEnv" . | indent 16 }}
{{- end }}
