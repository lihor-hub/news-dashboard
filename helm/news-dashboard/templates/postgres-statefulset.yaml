{{- if .Values.postgresql.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "news-dashboard.fullname" . }}-postgres
  labels:
    app.kubernetes.io/name: {{ include "news-dashboard.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.postgresql.port }}
      targetPort: postgres
      name: postgres
  selector:
    app.kubernetes.io/name: {{ include "news-dashboard.name" . }}-postgres
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "news-dashboard.fullname" . }}-postgres
spec:
  serviceName: {{ include "news-dashboard.fullname" . }}-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "news-dashboard.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "news-dashboard.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: postgres
          image: {{ .Values.postgresql.image | quote }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: {{ .Values.postgresql.port }}
          envFrom:
            - secretRef:
                name: {{ include "news-dashboard.fullname" . }}-postgres
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.postgresql.username | quote }}, "-d", {{ .Values.postgresql.database | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 20
          {{- with .Values.postgresql.resources }}
          resources:
{{ toYaml . | indent 12 }}
          {{- end }}
      volumes:
        - name: postgres-data
{{- if .Values.postgresql.persistence.hostPath }}
          hostPath:
            path: {{ .Values.postgresql.persistence.hostPath | quote }}
            type: DirectoryOrCreate
{{- else if .Values.postgresql.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "news-dashboard.fullname" . }}-postgres
{{- else }}
          emptyDir: {}
{{- end }}
{{- end }}
