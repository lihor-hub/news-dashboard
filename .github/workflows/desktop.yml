name: Desktop App (manual)

# Manual build only — automatic releases are handled by release.yml.
# Use this for testing the build without triggering a version bump.
# The app is unsigned — users bypass Gatekeeper with right-click → Open.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    name: macOS DMG
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        working-directory: desktop
        run: npm ci

      - name: Build universal DMG
        working-directory: desktop
        run: npm run build:mac

      - name: Find DMG
        id: dmg
        run: |
          DMG=$(find desktop/dist -name "*.dmg" | head -1)
          echo "path=$DMG" >> "$GITHUB_OUTPUT"
          ls -lh "$DMG"

      - uses: actions/upload-artifact@v4
        with:
          name: news-dashboard-dmg-manual
          path: ${{ steps.dmg.outputs.path }}
          retention-days: 7
