name: CI / CD

# Runs tests + typecheck on every PR.
# On push to main: also builds the Docker image, pushes it to GHCR, and
# deploys to the mini PC via a self-hosted runner running directly on the machine.
#
# PR strategy: change-aware routing so small backend-only or frontend-only
# changes don't run every unrelated test lane. Smoke tests always run.
# Full suite runs on every push to main and on demand via workflow_dispatch.
#
# Branch is 'main'. If you rename it to 'master', update the two filters below.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Merge queue: GitHub builds a temporary merge_group ref and waits for the
  # required checks before landing the PR on main. The test lanes below treat
  # merge_group like a push (full suite) so the queue gates on real results.
  merge_group:
  workflow_dispatch:
    inputs:
      full_suite:
        description: 'Run the full test suite (backend + frontend + coverage)'
        required: false
        default: 'true'
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Full image name. GITHUB_REPOSITORY is "owner/repo" (lower-cased by GHCR).
  IMAGE: ghcr.io/${{ github.repository }}

# Minimum permissions. packages:write is only exercised by the publish job;
# GitHub scopes GITHUB_TOKEN to the individual job automatically.
# models:read lets the publish job summarize the changelog via GitHub Models.
permissions:
  contents: read
  packages: write
  models: read

jobs:
  # ── 0. DETECT CHANGES ──────────────────────────────────────────────────────
  # Determine which parts of the codebase changed so later jobs can skip
  # unrelated test lanes on pull requests.
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      a11y: ${{ steps.filter.outputs.a11y }}
    steps:
      - uses: actions/checkout@v7

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'pyproject.toml'
              - 'scripts/**'
            frontend:
              - 'frontend/**'
              - 'package.json'
              - 'package-lock.json'
              - 'vite.config.ts'
              - 'index.html'
              - 'tsconfig*.json'
            a11y:
              - 'frontend/**'
              - 'e2e/a11y.spec.ts'
              - 'e2e/a11y-helper.ts'
              - 'e2e/fixtures.ts'
              - 'package.json'
              - 'package-lock.json'
              - 'playwright.config.ts'
              - 'vite.config.ts'
              - 'index.html'
              - 'public/manifest.webmanifest'

  # ── 1. LINT ────────────────────────────────────────────────────────────────
  # Static analysis only — fails fast and in parallel with the test jobs.
  lint:
    name: Lint & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - run: pip install -e '.[dev]'
      - name: ruff (lint)
        run: ruff check backend
      - name: ruff (format check)
        run: ruff format --check backend
      - name: mypy
        run: mypy backend
      - name: ty
        run: ty check backend
      - name: pyrefly
        run: pyrefly check backend

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: eslint
        run: npm run lint --silent
      - name: prettier (format check)
        run: npm run format:check --silent
      - name: TypeScript
        run: npm run typecheck --silent

  # ── 2. SMOKE ───────────────────────────────────────────────────────────────
  # Always runs on PRs and manual dispatches. Fast: no Postgres, no coverage.
  # Covers app boot, health endpoints, and core frontend render paths.
  smoke:
    name: Smoke tests
    runs-on: ubuntu-latest
    # Skip on push to main — the full test job already covers it.
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Backend smoke tests
        run: |
          COUNT=$(pytest -m smoke --collect-only -q 2>/dev/null | grep -c "::test_" || true)
          if [ "$COUNT" -eq 0 ]; then
            echo "ERROR: smoke test collection returned zero tests — check marker configuration" >&2
            exit 1
          fi
          pytest -m smoke -v

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: Frontend smoke tests
        run: |
          npm run test:frontend:smoke --silent

  # ── 3. TEST (BACKEND) ──────────────────────────────────────────────────────
  # On pull requests: runs only when backend files changed (or forced via dispatch).
  # On push to main: always runs.
  test-backend:
    name: Backend tests
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'workflow_dispatch' && inputs.full_suite == 'true') ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.backend == 'true')
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: news_dashboard
          POSTGRES_USER: news_dashboard
          POSTGRES_PASSWORD: news_dashboard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip
      - run: pip install -e '.[dev]'
      - name: Backend tests
        run: >
          pytest -v --cov --cov-report=term-missing --cov-report=xml --durations=20
          -o faulthandler_timeout=120 -o faulthandler_exit_on_timeout=true
        env:
          DATABASE_URL: postgresql://news_dashboard:news_dashboard@127.0.0.1:5432/news_dashboard
          TEST_DATABASE_URL: postgresql://news_dashboard:news_dashboard@127.0.0.1:5432/news_dashboard
      - name: Save backend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml

  # ── 4. TEST (FRONTEND) ─────────────────────────────────────────────────────
  # On pull requests: runs only when frontend files changed (or forced via dispatch).
  # On push to main: always runs (includes build / tsc typecheck).
  test-frontend:
    name: Frontend tests & build
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'workflow_dispatch' && inputs.full_suite == 'true') ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.frontend == 'true')
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci
      - name: vitest (frontend tests)
        run: npm run test:frontend:coverage --silent
      - name: Save frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/lcov.info
      - name: build (includes tsc)
        run: npm run build

  # ── 5. A11Y ────────────────────────────────────────────────────────────────
  # Runs the accessibility smoke test suite on PRs and pushes.
  # Change-aware: skips when no frontend/a11y-related files changed.
  # On push to main / merge_group: always runs.
  test-a11y:
    name: Accessibility tests
    needs: detect-changes
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event_name == 'merge_group' ||
      (github.event_name == 'workflow_dispatch' && inputs.full_suite == 'true') ||
      (github.event_name == 'pull_request' && needs.detect-changes.outputs.a11y == 'true')
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: '26'
          cache: npm
      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Accessibility smoke tests
        run: npx playwright test e2e/a11y.spec.ts

  # ── 6. TEST ROLLUP ─────────────────────────────────────────────────────────
  # Satisfies the "Test & build" required status check while the component jobs
  # use the new change-aware names. Skips if any component job is skipped
  # (all-skipped = no relevant files changed, so the check still passes).
  test:
    name: Test & build
    needs: [test-backend, test-frontend, test-a11y]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Aggregate test results
        run: |
          backend="${{ needs.test-backend.result }}"
          frontend="${{ needs.test-frontend.result }}"
          a11y="${{ needs.test-a11y.result }}"
          if [[ "$backend" == "failure" || "$backend" == "cancelled" ]]; then
            echo "Backend tests failed or were cancelled ($backend)" && exit 1
          fi
          if [[ "$frontend" == "failure" || "$frontend" == "cancelled" ]]; then
            echo "Frontend tests failed or were cancelled ($frontend)" && exit 1
          fi
          if [[ "$a11y" == "failure" || "$a11y" == "cancelled" ]]; then
            echo "Accessibility tests failed or were cancelled ($a11y)" && exit 1
          fi
          echo "All test lanes passed (backend=$backend, frontend=$frontend, a11y=$a11y)"
  # ── 7. COVERAGE UPLOAD ─────────────────────────────────────────────────────
  # Uploads coverage reports to Codecov for tracking test coverage trends.
  coverage-upload:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: always() && (github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - name: Download backend coverage
        if: needs.test-backend.result == 'success' || needs.test-backend.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: ./coverage-backend

      - name: Download frontend coverage
        if: needs.test-frontend.result == 'success' || needs.test-frontend.result == 'failure'
        uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: ./coverage-frontend

      - name: Upload Backend to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-backend/*.xml
          flags: backend
          name: codecov-backend
          fail_ci_if_error: false
          verbose: true

      - name: Upload Frontend to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-frontend/lcov.info
          flags: frontend
          name: codecov-frontend
          fail_ci_if_error: false
          verbose: true

  # ── 8. HELM VALIDATE ───────────────────────────────────────────────────────
  # Lints and renders the Helm chart with default and production-like values.
  # Runs on every push/PR so a broken template fails well before the deploy job.
  # No live cluster is required — this is render/lint only.
  helm-validate:
    name: Helm chart validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: azure/setup-helm@v5
        with:
          version: latest

      - name: helm lint
        run: helm lint ./helm/news-dashboard

      - name: helm template (defaults)
        run: |
          helm template news-dashboard ./helm/news-dashboard \
            --set-string "app.auth.sessionSecret=dummy-session-secret-for-render-only" \
            --set-string "postgresql.password=dummy-postgres-password-for-render-only"

      - name: helm template (production-like overrides)
        run: |
          helm template news-dashboard ./helm/news-dashboard \
            --set "image.repository=ghcr.io/ioachim-hub/news-dashboard" \
            --set "image.tag=abc1234" \
            --set "image.pullSecretName=ghcr-pull-secret" \
            --set "service.type=NodePort" \
            --set "service.nodePort=30088" \
            --set "postgresql.persistence.hostPath=/home/ioachim-minipc/news-dashboard-postgres-data" \
            --set-string "app.auth.sessionSecret=dummy-session-secret-for-render-only" \
            --set-string "postgresql.password=dummy-postgres-password-for-render-only" \
            --set "app.ai.existingSecret=news-dashboard-ai" \
            --set "app.push.existingSecret=news-dashboard-push" \
            --set-string "app.ai.freeLlmBaseUrl=http://192.168.0.75:9130/v1" \
            --set-string "app.ai.briefingModel=gpt-4o" \
            --set-string "app.ai.langfuse.host=http://langfuse.local" \
            --set-string "app.push.email=test@example.com"

      - name: helm template (external postgresql)
        run: |
          helm template news-dashboard ./helm/news-dashboard \
            --set "postgresql.enabled=false" \
            --set "app.databaseUrl.existingSecret=news-dashboard-db" \
            --set-string "app.auth.sessionSecret=dummy-session-secret-for-render-only"

  # ── 9. PUBLISH ─────────────────────────────────────────────────────────────
  # Builds one image and pushes two tags:
  #   :<sha>    — immutable, pinned to this exact commit; used by the deploy step
  #   :latest   — floating convenience tag for manual pulls / rollback reference
  #
  # Why two tags? "latest" alone is not enough: if the tag name hasn't changed,
  # a node with imagePullPolicy: IfNotPresent won't re-pull it.  Pinning to the
  # SHA guarantees a fresh pull for every deploy without setting Always.
  #
  # No secrets needed here — GITHUB_TOKEN is provided automatically and has
  # packages:write by default for the repo that owns the package.
  publish:
    name: Build & push image
    needs: [lint, test, helm-validate]
    runs-on: [self-hosted]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # tags + history for version computation

      # No actions/setup-python here: this job runs on the self-hosted runner,
      # which has no prebuilt Python 3.14 in the actions tool-cache for its
      # OS/arch (setup-python fails with "version '3.14' … was not found").
      # The changelog step only needs the runner's system python3 to run
      # scripts/update_changelog.py (pure stdlib), matching release.yml's
      # self-hosted job, which also runs without setup-python.

      # Derive the release version from tags + commits and bake it into the
      # image, so /api/version and /api/changelog match the deployed code.
      # release.yml computes the same value from the same script and tags it.
      - name: Compute version
        id: version
        run: bash scripts/next_version.sh >> "$GITHUB_OUTPUT"

      - name: Collect commits since last tag
        id: log
        run: |
          LAST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -1)
          RANGE="HEAD"
          [ -n "$LAST_TAG" ] && RANGE="${LAST_TAG}..HEAD"
          {
            echo "commits<<COMMITS_EOF"
            git log --no-merges --pretty=format:'- %s' "$RANGE"
            echo
            echo "COMMITS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate changelog entry (Pi)
        id: ai
        continue-on-error: true
        env:
          PI_EXTENSION: "$HOME/pi/packages/coding-agent/examples/extensions/lihor-provider"
          SYSTEM_PROMPT: |
            You write the "What's new" notes that everyday users of a news
            dashboard app see in an in-app popup after the app updates. Your
            readers are NOT developers — write for them, not for engineers.

            Given raw git commit subjects, output ONLY markdown "- " bullet
            lines. Rules:
            - Describe the benefit to the user — what they can now do, see, or
              no longer have to deal with — not the technical change that
              delivered it.
            - Write in plain, friendly language. Address the user as "you" /
              "your" where natural.
            - NO jargon, internal names, file paths, config keys, library or
              service names (e.g. Helm, Langfuse, cache, endpoint, API, schema,
              migration), version numbers, or ticket/PR references.
            - Merge related commits into a single user-facing bullet.
            - Omit anything with no visible effect for users — chore, ci, test,
              refactor, docs, deploy/infra, observability, and other internal
              work. If a release is entirely internal, summarize it as a single
              bullet like "Stability and performance improvements."
            Output no headings, no version number, and no preamble — bullets only.
          PROMPT: |
            Commits for release ${{ steps.version.outputs.tag }}:
            ${{ steps.log.outputs.commits }}
        run: |
          changelog=$(pi -e "$PI_EXTENSION" -p "$SYSTEM_PROMPT

          $PROMPT")
          {
            echo "response<<EOF"
            echo "$changelog"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bake version + changelog into the build context
        env:
          V: ${{ steps.version.outputs.version }}
          NOTES: ${{ steps.ai.outputs.response }}
          COMMITS: ${{ steps.log.outputs.commits }}
        run: |
          echo "$V" > VERSION
          # Fall back to raw commit subjects if inference returned nothing.
          BODY="$NOTES"
          [ -z "$(printf '%s' "$BODY" | tr -d '[:space:]')" ] && BODY="$COMMITS"
          printf '%s\n' "$BODY" | python3 scripts/update_changelog.py --version "$V"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # ── 10. DEPLOY ─────────────────────────────────────────────────────────────
  # Runs directly on the self-hosted runner (the mini PC itself) — no SSH hop
  # needed. The runner process on the mini PC picks up the job and executes
  # the deploy commands locally.
  #
  # Concurrency: cancel-in-progress: false means a second push waits rather
  # than racing.  Never cancel a deploy mid-flight.
  #
  # ┌──────────────────────────────────────────────────────────────────────┐
  # │  SECRETS — add in: GitHub repo → Settings → Secrets → Actions       │
  # │                                                                      │
  # │  GHCR_TOKEN       A GitHub Personal Access Token with the            │
  # │                   *read:packages* scope (nothing else).               │
  # │                   Create at: github.com/settings/tokens              │
  # │                   (Classic token, read:packages, 1-year expiry.)     │
  # │                   This lets the mini PC pull the image from GHCR.    │
  # │                                                                      │
  # │  SESSION_SECRET   A long random string used to sign app sessions.    │
  # │                   Required when Keycloak auth is enabled.            │
  # │                                                                      │
  # │  POSTGRES_        Password for the bundled in-cluster PostgreSQL      │
  # │  PASSWORD         StatefulSet. Required when postgresql.enabled is   │
  # │                   true (the default). Changing this secret in the    │
  # │                   cluster does NOT rotate an already-initialized     │
  # │                   database password; existing deployments that used  │
  # │                   the old default must run ALTER USER on Postgres    │
  # │                   separately.                                        │
  # │                                                                      │
  # │                   SHORTCUT: if you make the GHCR package public      │
  # │                   (repo Settings → Packages → Change visibility),    │
  # │                   you can skip GHCR_TOKEN entirely and remove the    │
  # │                   docker-login lines from the deploy step below.     │
  # └──────────────────────────────────────────────────────────────────────┘
  deploy:
    name: Deploy to mini PC
    needs: [publish, trivy]
    runs-on: [self-hosted]
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Deploy (Helm)
        env:
          SHA: ${{ github.sha }}
          IMG: ${{ env.IMAGE }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_ACTOR: ${{ github.actor }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FREE_LLM_API_KEY: ${{ secrets.FREE_LLM_API_KEY }}
          FREE_LLM_BASE_URL: ${{ vars.FREE_LLM_BASE_URL }}
          OPENAI_BRIEFING_MODEL: ${{ vars.OPENAI_BRIEFING_MODEL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL: ${{ vars.VAPID_EMAIL }}
        run: |
          set -euo pipefail

          if [ -z "$SESSION_SECRET" ]; then
            echo "SESSION_SECRET GitHub Actions secret is required for production auth." >&2
            exit 1
          fi

          if [ -z "$POSTGRES_PASSWORD" ]; then
            echo "POSTGRES_PASSWORD GitHub Actions secret is required for production DB." >&2
            exit 1
          fi

          # Authenticate to GHCR so the cluster node can pull the image.
          # Remove these two lines if the GHCR package is public.
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_ACTOR" --password-stdin

          # Pull eagerly — surfaces auth failures before touching the cluster.
          docker pull "${IMG}:${SHA}"

          kubectl create namespace news-dashboard --dry-run=client -o yaml | kubectl apply -f -

          # Let Kubernetes pull the private GHCR image during rollout.
          kubectl -n news-dashboard create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username="$GHCR_ACTOR" \
            --docker-password="$GHCR_TOKEN" \
            --dry-run=client -o yaml | kubectl apply -f -

          ai_secret_args=()
          if [ -n "$OPENAI_API_KEY" ]; then
            ai_secret_args+=(--from-literal=OPENAI_API_KEY="$OPENAI_API_KEY")
          fi
          if [ -n "$FREE_LLM_API_KEY" ]; then
            ai_secret_args+=(--from-literal=FREE_LLM_API_KEY="$FREE_LLM_API_KEY")
          fi
          if [ -n "$LANGFUSE_PUBLIC_KEY" ]; then
            ai_secret_args+=(--from-literal=LANGFUSE_PUBLIC_KEY="$LANGFUSE_PUBLIC_KEY")
          fi
          if [ -n "$LANGFUSE_SECRET_KEY" ]; then
            ai_secret_args+=(--from-literal=LANGFUSE_SECRET_KEY="$LANGFUSE_SECRET_KEY")
          fi

          ai_helm_args=()
          if [ ${#ai_secret_args[@]} -gt 0 ]; then
            kubectl -n news-dashboard create secret generic news-dashboard-ai \
              "${ai_secret_args[@]}" \
              --dry-run=client -o yaml | kubectl apply -f -
            ai_helm_args+=(--set app.ai.existingSecret=news-dashboard-ai)
          fi
          if [ -n "$FREE_LLM_BASE_URL" ]; then
            ai_helm_args+=(--set-string "app.ai.freeLlmBaseUrl=$FREE_LLM_BASE_URL")
          fi
          if [ -n "$OPENAI_BRIEFING_MODEL" ]; then
            ai_helm_args+=(--set-string "app.ai.briefingModel=$OPENAI_BRIEFING_MODEL")
          fi
          if [ -n "$LANGFUSE_HOST" ]; then
            ai_helm_args+=(--set-string "app.ai.langfuse.host=$LANGFUSE_HOST")
          fi

          push_secret_args=()
          if [ -n "$VAPID_PUBLIC_KEY" ]; then
            push_secret_args+=(--from-literal=VAPID_PUBLIC_KEY="$VAPID_PUBLIC_KEY")
          fi
          if [ -n "$VAPID_PRIVATE_KEY" ]; then
            push_secret_args+=(--from-literal=VAPID_PRIVATE_KEY="$VAPID_PRIVATE_KEY")
          fi

          push_helm_args=()
          if [ ${#push_secret_args[@]} -gt 0 ]; then
            kubectl -n news-dashboard create secret generic news-dashboard-push \
              "${push_secret_args[@]}" \
              --dry-run=client -o yaml | kubectl apply -f -
            push_helm_args+=(--set app.push.existingSecret=news-dashboard-push)
          fi
          if [ -n "$VAPID_EMAIL" ]; then
            push_helm_args+=(--set-string "app.push.email=$VAPID_EMAIL")
          fi

          # Sync Helm chart changes from main. Avoid relying on the deploy
          # host clone's branch/upstream config, which may point at a deleted
          # feature branch.
          cd ~/news-dashboard
          git fetch --prune origin main
          git checkout --detach FETCH_HEAD

          # Upgrade (or install on first run). Keep the host Caddy route stable
          # by preserving the NodePort and local durable hostPath storage.
          helm_args=(
            upgrade --install news-dashboard ./helm/news-dashboard
            --namespace news-dashboard --create-namespace
            --set "image.repository=${IMG}"
            --set "image.tag=${SHA}"
            --set image.pullSecretName=ghcr-pull-secret
            --set service.type=NodePort
            --set service.nodePort=30088
            --set postgresql.persistence.hostPath=/home/ioachim-minipc/news-dashboard-postgres-data
            --set ingress.enabled=false
            --set-string app.auth.sessionSecret="$SESSION_SECRET"
            --set-string postgresql.password="$POSTGRES_PASSWORD"
            "${ai_helm_args[@]}"
            "${push_helm_args[@]}"
          )
          helm "${helm_args[@]}"

          # Wait for the new pods to become ready.
          kubectl -n news-dashboard rollout status \
            deployment/news-dashboard-news-dashboard --timeout=120s

      # Basic liveness check — verifies the new container is actually serving.
      - name: Smoke test
        run: |
          curl -sf --max-time 10 --retry 6 --retry-delay 5 \
            http://localhost:30088/api/health | grep '"status":"ok"'

  # ── 11. TRIVY SCAN ─────────────────────────────────────────────────────────
  # Scans the container image for vulnerabilities using Trivy and uploads
  # results to GitHub Security tab as SARIF.
  trivy:
    name: Trivy vulnerability scan
    needs: publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          exit-code: '1'  # Fail on any vulnerabilities
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy
