name: CI / CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/ioachim-hub/news-dashboard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Tightest permissions that still work:
#   contents:read  — checkout
#   packages:write — push to GHCR (publish job only)
permissions:
  contents: read
  packages: write

jobs:
  # ────────────────────────────────────────────────────────────────
  # 1. Test & build artifacts
  # ────────────────��───────────────────────────────────────────────
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install backend dependencies
        run: pip install -e '.[dev]'

      - name: Backend tests
        run: pytest -v

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install frontend dependencies
        run: npm install

      - name: Frontend typecheck & build
        run: npm run build

  # ────────────────────────────────────────────────────────────────
  # 2. Build and push Docker image to GHCR
  #    Runs only on pushes to main (not on PRs).
  #    Image is tagged with the commit SHA — never "latest" alone,
  #    so imagePullPolicy: IfNotPresent works correctly.
  # ────────────────────────────────────────────────────────────────
  publish:
    name: Publish container
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest

  # ────────────────────────────────────────────────────────────────
  # 3. Deploy to ioachim-minipc
  #
  #    Runs on a self-hosted GitHub Actions runner installed on the
  #    production machine.  The runner must have kubectl and helm in
  #    PATH and a valid kubeconfig (~/.kube/config or KUBECONFIG).
  #
  #    concurrency: we never cancel a running deploy — a concurrent
  #    push waits until the current deploy finishes.
  # ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ioachim-minipc
    needs: publish
    runs-on: [self-hosted, ioachim-minipc]
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      # Refresh the GHCR imagePullSecret in the cluster.
      # Uses GHCR_READ_TOKEN (a PAT with read:packages scope) — unlike
      # GITHUB_TOKEN, a PAT doesn't expire after the workflow, so pods that
      # restart days later can still pull the image.
      - name: Refresh GHCR pull secret in cluster
        run: |
          kubectl create secret docker-registry ghcr-pull-secret \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GHCR_READ_TOKEN }} \
            --namespace=news-dashboard \
            --dry-run=client -o yaml | kubectl apply -f -

      # Helm upgrade is idempotent: creates the release if it doesn't exist,
      # updates it otherwise.  We pin the exact SHA tag so Kubernetes always
      # pulls the freshly-built image (IfNotPresent + new tag = one pull).
      - name: Deploy with Helm
        run: |
          helm upgrade --install news-dashboard ./helm/news-dashboard \
            --namespace news-dashboard --create-namespace \
            --set image.tag=${{ github.sha }} \
            --set service.type=NodePort \
            --set service.nodePort=30088 \
            --set persistence.hostPath=/home/ioachim-minipc/news-dashboard-data \
            --set postgresql.persistence.hostPath=/home/ioachim-minipc/news-dashboard-postgres-data

      # Wait for the app pod to become ready.  120 s is generous for a
      # single-container Python app on a local cluster.
      - name: Wait for app rollout
        run: |
          kubectl -n news-dashboard rollout status \
            deployment/news-dashboard-news-dashboard --timeout=120s

      - name: Smoke-test /api/health
        run: |
          curl -sf --retry 5 --retry-delay 3 \
            http://127.0.0.1:30088/api/health | grep '"status":"ok"'
