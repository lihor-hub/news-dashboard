name: Android APK (manual)

# Manual build only — automatic releases are handled by release.yml.
# Use this for testing the build without triggering a version bump.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64   — base64-encoded android.keystore (JKS)
#   ANDROID_KEYSTORE_PASSWORD — keystore password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — key entry password

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & sign APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v4

      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/android.keystore

      - name: Build signed APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PstoreFile="$GITHUB_WORKSPACE/android/android.keystore" \
            -PstorePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.ANDROID_KEY_PASSWORD }}"

      - name: Find APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          VERSION=$(cat VERSION)
          DEST="news-dashboard-android-v${VERSION}-manual-${{ github.run_number }}.apk"
          cp "$APK" "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"
          ls -lh "$DEST"

      - uses: actions/upload-artifact@v4
        with:
          name: news-dashboard-apk-manual
          path: ${{ steps.apk.outputs.path }}
          retention-days: 7
