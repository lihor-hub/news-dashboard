name: Android APK

# Build and sign the TWA APK on demand or when android/ changes.
# The signed APK is uploaded as a workflow artifact.
#
# Required repository secrets:
#   ANDROID_KEYSTORE_BASE64   — base64-encoded android.keystore (JKS)
#   ANDROID_KEYSTORE_PASSWORD — keystore password
#   ANDROID_KEY_ALIAS         — key alias inside the keystore
#   ANDROID_KEY_PASSWORD      — key entry password

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['android/**']

permissions:
  contents: read

jobs:
  build:
    name: Build & sign APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # JDK 17 is required by Android Gradle Plugin 8.x
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Android SDK — installs build-tools, platform-tools, and cmdline-tools
      - uses: android-actions/setup-android@v3

      # Decode the base64 keystore secret into the android/ directory
      - name: Decode keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/android.keystore

      # Build and sign the release APK directly via Gradle
      - name: Build signed APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -PstoreFile="$GITHUB_WORKSPACE/android/android.keystore" \
            -PstorePassword="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            -PkeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" \
            -PkeyPassword="${{ secrets.ANDROID_KEY_PASSWORD }}"

      # Locate the signed APK in the standard Gradle output directory
      - name: Find APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          echo "Found APK: $APK"
          ls -lh "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: news-dashboard-apk
          path: ${{ steps.apk.outputs.path }}
          retention-days: 30
